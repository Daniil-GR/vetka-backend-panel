{{define "partial-toasts"}}
{{if .FlashItems}}
<div class="toast-stack" aria-live="polite">
  {{range .FlashItems}}
  <div class="toast toast-{{.Level}}" role="{{if eq .Level "error"}}alert{{else}}status{{end}}">
    <div class="toast__body">{{.Text}}</div>
    <button type="button" class="icon-button toast__close" data-toast-dismiss aria-label="Dismiss notification">x</button>
  </div>
  {{end}}
</div>
{{end}}
{{end}}
