{{define "login.html"}}{{template "login-layout-open" .}}{{template "login-content" .}}{{template "login-layout-close" .}}{{end}}

{{define "login-content"}}
<main class="login-page">
  <section class="login-card">
    <div class="login-brand">
      <span class="brand-mark">{{template "icon-logo" .}}</span>
      <div>
        <p class="eyebrow">Protected Access</p>
        <h1>Vetka Backend Panel</h1>
      </div>
    </div>
    {{template "partial-toasts" .}}
    <form method="post" action="/login" class="form-grid">
      <label class="field field-span-2"><span>Username</span><input name="username" autocomplete="username" required></label>
      <label class="field field-span-2"><span>Password</span><div class="password-field"><input name="password" type="password" autocomplete="current-password" required data-password-input><button type="button" class="button button-ghost" data-password-toggle>Show</button></div></label>
      <button class="button button-primary field-span-2" type="submit">Log In</button>
    </form>
  </section>
</main>
{{end}}
