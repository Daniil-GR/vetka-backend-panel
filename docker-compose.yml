services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vetka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetka}
      POSTGRES_DB: ${POSTGRES_DB:-vetka_backend}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetka -d vetka_backend"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: dev
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      PANEL_PUBLIC_BASE_URL: ${PANEL_PUBLIC_BASE_URL:-http://localhost:8080}
      SUBSCRIPTION_PUBLIC_BASE_URL: ${SUBSCRIPTION_PUBLIC_BASE_URL:-http://localhost:8080}
      SUBSCRIPTION_PROFILE_TITLE: ${SUBSCRIPTION_PROFILE_TITLE:-Ветка VPN}
      SUBSCRIPTION_UPDATE_INTERVAL_HOURS: ${SUBSCRIPTION_UPDATE_INTERVAL_HOURS:-12}
      DATABASE_URL: ${DATABASE_URL:-postgres://vetka:vetka@postgres:5432/vetka_backend?sslmode=disable}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-token}
      BACKEND_PUBLIC_IP: ${BACKEND_PUBLIC_IP:-127.0.0.1}
      NODE_AGENT_DEFAULT_PORT: ${NODE_AGENT_DEFAULT_PORT:-2222}

  caddy:
    image: caddy:2
    profiles: ["https"]
    environment:
      PANEL_DOMAIN: ${PANEL_DOMAIN:-panel.localhost}
      SUBSCRIPTION_DOMAIN: ${SUBSCRIPTION_DOMAIN:-sub.localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
