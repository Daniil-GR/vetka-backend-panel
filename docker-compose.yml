services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vetka
      POSTGRES_PASSWORD: vetka
      POSTGRES_DB: vetka_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetka -d vetka_backend"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: dev
      HTTP_ADDR: :8080
      PUBLIC_BASE_URL: http://localhost:8080
      DATABASE_URL: postgres://vetka:vetka@postgres:5432/vetka_backend?sslmode=disable
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
      ADMIN_API_TOKEN: change-me-token
      BACKEND_PUBLIC_IP: 127.0.0.1
      NODE_AGENT_DEFAULT_PORT: 2222
    ports:
      - "8080:8080"

volumes:
  postgres-data:
